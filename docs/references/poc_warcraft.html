<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas RTS: Campaign Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; user-select: none; }
        #game-canvas, #fog-canvas {
            image-rendering: pixelated;
            display: block;
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }
        #fog-canvas { opacity: 0.85; mix-blend-mode: multiply; }
        .ui-panel {
            background-color: #2d3748;
            border: 4px inset #4a5568;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 1px 1px 0 #000;
        }
        .action-btn {
            background: linear-gradient(to bottom, #4a5568, #2d3748);
            border: 2px solid #a0aec0;
            border-bottom-color: #1a202c; border-right-color: #1a202c;
            cursor: pointer; transition: filter 0.1s;
        }
        .action-btn:active {
            border: 2px solid #1a202c;
            border-bottom-color: #a0aec0; border-right-color: #a0aec0;
            background: #2d3748;
        }
        .action-btn:hover:not(:disabled) { filter: brightness(1.2); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        
        #game-over-banner {
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
        }
    </style>
</head>
<body class="flex h-screen w-screen text-sm">

    <!-- Left UI Sidebar -->
    <div class="w-64 flex flex-col ui-panel z-20 h-full shadow-2xl">
        <!-- Minimap -->
        <div class="h-64 p-2 bg-black flex justify-center items-center border-b-4 border-gray-700">
            <div id="minimap-container" class="relative w-full h-full max-w-[200px] max-h-[200px] cursor-crosshair">
                <canvas id="minimap" width="200" height="200" class="border-2 border-gray-600 w-full h-full block" style="image-rendering: pixelated;"></canvas>
                <div id="minimap-cam" class="absolute border border-white pointer-events-none hidden box-border" style="left:0; top:0;"></div>
            </div>
        </div>
        
        <!-- Selection Info -->
        <div id="selection-info" class="flex-1 p-4 border-b-4 border-gray-700 flex flex-col gap-2 overflow-y-auto bg-gray-900">
            <h2 id="sel-name" class="text-xl font-bold text-yellow-400">Nothing Selected</h2>
            <div id="sel-hp-bar" class="w-full h-4 bg-red-900 hidden border border-gray-900">
                <div id="sel-hp-fill" class="h-full bg-green-500 transition-all duration-200" style="width: 100%;"></div>
            </div>
            <p id="sel-stats" class="text-gray-300"></p>
            <p id="sel-desc" class="text-xs text-gray-400 mt-2"></p>
        </div>

        <!-- Action Panel -->
        <div id="action-panel" class="h-64 p-3 grid grid-cols-2 gap-2 bg-gray-800"></div>
    </div>

    <!-- Main Game Area -->
    <div id="game-container" class="flex-1 relative cursor-crosshair overflow-hidden bg-black">
        <!-- Top Resource Bar -->
        <div class="absolute top-0 left-0 w-full h-12 ui-panel border-0 border-b-4 flex items-center justify-between px-6 z-20 bg-opacity-95">
            <div class="flex space-x-6">
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 bg-yellow-400 border border-yellow-200 shadow-sm"></div>
                    <span>Gold: <span id="res-gold" class="text-yellow-400 font-bold">500</span></span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 bg-yellow-800 border border-yellow-600 shadow-sm"></div>
                    <span>Wood: <span id="res-wood" class="text-yellow-700 font-bold">150</span></span>
                </div>
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 bg-red-600 border border-red-400 shadow-sm"></div>
                    <span>Food: <span id="res-food" class="text-red-400 font-bold">0/0</span></span>
                </div>
            </div>
            <div class="flex items-center space-x-6">
                <div id="status-display" class="text-green-400 font-bold uppercase tracking-widest">Peaceful</div>
                <div id="clock-display" class="text-blue-300 font-bold">Day 1 - 08:00</div>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>
        <canvas id="fog-canvas"></canvas>
        <div id="day-night-overlay" class="absolute inset-0 pointer-events-none bg-blue-900 mix-blend-multiply opacity-0 transition-opacity duration-1000 z-10"></div>
        
        <!-- Game Over Banner -->
        <div id="game-over-banner" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none hidden z-30 bg-black bg-opacity-50">
            <h1 id="go-title" class="text-6xl font-black text-yellow-400 mb-4 tracking-widest uppercase">Victory</h1>
            <p id="go-desc" class="text-2xl text-white font-bold">All Orc Camps Destroyed!</p>
        </div>
    </div>

<script>
/**
 * --- GAME CONFIGURATION ---
 */
const TILE_SIZE = 32;
const MAP_WIDTH = 80; 
const MAP_HEIGHT = 80;
const WORLD_WIDTH = MAP_WIDTH * TILE_SIZE;
const WORLD_HEIGHT = MAP_HEIGHT * TILE_SIZE;

const PALETTE = {
    skin: '#ffcc99', skinDark: '#eebb88',
    blue: '#1e3a8a', blueL: '#3b82f6',
    red: '#7f1d1d', redL: '#ef4444',
    green: '#166534', greenL: '#22c55e',
    wood: '#78350f', woodL: '#b45309',
    gold: '#eab308', stone: '#4b5563', stoneL: '#9ca3af',
    black: '#000000', shadow: 'rgba(0,0,0,0.3)'
};

/**
 * --- SYNTH AUDIO ENGINE ---
 */
const AudioSys = {
    ctx: null,
    init() { window.AudioContext = window.AudioContext || window.webkitAudioContext; this.ctx = new AudioContext(); },
    play(freq, type, duration, vol=0.1, slideFreq=null) {
        if(!this.ctx) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    sfx: {
        chop: () => AudioSys.play(100, 'square', 0.1, 0.05, 50),
        mine: () => AudioSys.play(300, 'triangle', 0.1, 0.05, 150),
        build: () => AudioSys.play(150, 'sawtooth', 0.15, 0.05, 50),
        hit: () => AudioSys.play(80, 'sawtooth', 0.2, 0.1, 40),
        shoot: () => AudioSys.play(600, 'triangle', 0.1, 0.05, 1200),
        alert: () => AudioSys.play(400, 'square', 0.8, 0.2, 300),
        click: () => AudioSys.play(800, 'sine', 0.05, 0.05),
        win: () => { AudioSys.play(400, 'sine', 0.2, 0.1, 600); setTimeout(()=>AudioSys.play(600, 'sine', 0.4, 0.1, 800), 200); },
        lose: () => { AudioSys.play(200, 'sawtooth', 0.4, 0.1, 100); setTimeout(()=>AudioSys.play(100, 'sawtooth', 0.6, 0.1, 50), 400); }
    }
};

/**
 * --- PROCEDURAL SPRITE GENERATOR ---
 */
const SpriteGen = {
    generate(type) {
        let size = ['townhall', 'farm', 'barracks', 'tower', 'orc_camp'].includes(type) ? 32 : 16;
        let c = document.createElement('canvas');
        c.width = size; c.height = size;
        let ctx = c.getContext('2d');
        
        const p = (x, y, color) => { ctx.fillStyle = color; ctx.fillRect(Math.floor(x), Math.floor(y), 1, 1); };
        const rect = (x, y, w, h, color) => { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); };
        const circle = (cx, cy, r, color) => {
            for(let y=-r; y<=r; y++) for(let x=-r; x<=r; x++) 
                if(x*x + y*y <= r*r) p(cx+x, cy+y, color);
        };

        if (['peasant', 'footman', 'orc', 'archer'].includes(type)) {
            let primary = type === 'orc' ? PALETTE.redL : (type === 'archer' ? PALETTE.greenL : PALETTE.blueL);
            let secondary = type === 'orc' ? PALETTE.red : (type === 'archer' ? PALETTE.green : PALETTE.blue);
            let skin = type === 'orc' ? PALETTE.greenL : PALETTE.skin;
            
            rect(4, 14, 8, 2, PALETTE.shadow);
            rect(4, 2, 8, 13, PALETTE.black);
            rect(6, 3, 4, 4, type==='footman' ? PALETTE.stoneL : skin);
            if(type === 'footman') rect(7, 4, 2, 2, PALETTE.black); 
            
            rect(5, 7, 6, 5, primary);
            rect(6, 8, 4, 3, secondary); 
            rect(5, 12, 2, 3, PALETTE.wood); rect(9, 12, 2, 3, PALETTE.wood);
            
            rect(4, 7, 1, 4, skin); rect(11, 7, 1, 4, skin);
            if (type === 'peasant') rect(3, 5, 1, 8, PALETTE.wood);
            if (type === 'footman') { rect(3, 3, 1, 8, PALETTE.stoneL); rect(12, 6, 1, 5, PALETTE.wood); }
            if (type === 'orc') rect(3, 4, 2, 6, PALETTE.stone); 
            if (type === 'archer') { rect(13, 4, 1, 10, PALETTE.wood); rect(12, 4, 1, 1, PALETTE.stoneL); rect(12, 13, 1, 1, PALETTE.stoneL); }
        }
        else if (type === 'tree') {
            rect(6, 12, 4, 4, PALETTE.black); 
            rect(7, 11, 2, 5, PALETTE.wood); 
            circle(8, 7, 6, PALETTE.black);
            for(let i=0; i<80; i++) {
                let a = Math.random() * Math.PI * 2, r = Math.random() * 5.5;
                p(8 + Math.cos(a)*r, 7 + Math.sin(a)*r, Math.random()>0.4 ? PALETTE.greenL : PALETTE.green);
            }
        }
        else if (type === 'goldmine') {
            circle(8, 10, 7, PALETTE.black); 
            circle(8, 10, 6, PALETTE.stone); 
            rect(6, 10, 4, 6, PALETTE.black); 
            for(let i=0; i<15; i++) p(2+Math.random()*12, 4+Math.random()*10, PALETTE.gold);
        }
        else if (['townhall', 'farm', 'barracks', 'tower', 'orc_camp'].includes(type)) {
            rect(2, 28, 28, 4, PALETTE.shadow);
            
            if (type === 'tower') {
                rect(6, 20, 20, 10, PALETTE.stone); 
                for(let i=0;i<30;i++) p(6+Math.random()*20,20+Math.random()*10, PALETTE.stoneL);
                rect(8, 8, 16, 12, PALETTE.wood); 
                rect(6, 4, 20, 4, PALETTE.blue); 
                rect(8, 2, 16, 2, PALETTE.blueL);
                rect(14, 22, 4, 8, PALETTE.black); 
                rect(14, 10, 4, 4, PALETTE.black); 
            } else if (type === 'orc_camp') {
                rect(4, 16, 24, 12, PALETTE.black); // base shadow
                rect(6, 12, 20, 16, PALETTE.red); // main tent
                rect(8, 10, 16, 18, PALETTE.redL);
                rect(14, 16, 4, 12, PALETTE.black); // door
                // Spikes
                rect(2, 8, 2, 16, PALETTE.woodL); p(2,7,PALETTE.woodL);
                rect(28, 8, 2, 16, PALETTE.woodL); p(28,7,PALETTE.woodL);
                rect(6, 6, 2, 10, PALETTE.woodL); p(6,5,PALETTE.woodL);
                rect(24, 6, 2, 10, PALETTE.woodL); p(24,5,PALETTE.woodL);
            } else {
                rect(2, 10, 28, 20, PALETTE.black);
                rect(3, 11, 26, 18, PALETTE.woodL);
                rect(3, 20, 26, 9, PALETTE.stone);
                
                for(let i=0; i<50; i++) p(3+Math.random()*26, 20+Math.random()*9, PALETTE.stoneL);
                for(let i=0; i<30; i++) p(3+Math.random()*26, 11+Math.random()*9, PALETTE.wood);

                if (type === 'townhall') {
                    rect(2, 4, 28, 8, PALETTE.blue);
                    rect(4, 2, 24, 4, PALETTE.blueL);
                    rect(12, 22, 8, 8, PALETTE.black);
                } else if (type === 'farm') {
                    rect(4, 6, 24, 6, PALETTE.gold);
                    for(let i=0; i<40; i++) p(4+Math.random()*24, 6+Math.random()*6, PALETTE.woodL);
                    rect(14, 24, 4, 6, PALETTE.black); 
                } else if (type === 'barracks') {
                    rect(2, 6, 28, 4, PALETTE.stoneL); 
                    for(let x=2; x<30; x+=4) rect(x, 4, 2, 2, PALETTE.stoneL);
                    rect(12, 20, 8, 10, PALETTE.black); 
                    rect(6, 14, 4, 4, PALETTE.black);
                }
            }
        }

        let scale = ['townhall', 'farm', 'barracks', 'tower', 'orc_camp'].includes(type) ? 3 : 2.5; 
        let sCanvas = document.createElement('canvas');
        sCanvas.width = size * scale; sCanvas.height = size * scale;
        let sCtx = sCanvas.getContext('2d');
        sCtx.imageSmoothingEnabled = false;
        sCtx.drawImage(c, 0, 0, size * scale, size * scale);
        return sCanvas;
    }
};

class Projectile {
    constructor(x, y, tx, ty, targetEnt, dmg, owner) {
        this.x = x; this.y = y; this.tx = tx; this.ty = ty; 
        this.target = targetEnt; this.dmg = dmg; this.owner = owner;
        this.speed = 6;
    }
    update() {
        if (this.target && this.target.hp > 0) { this.tx = this.target.x; this.ty = this.target.y; }
        let dx = this.tx - this.x, dy = this.ty - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < this.speed) {
            if (this.target && this.target.hp > 0) {
                AudioSys.sfx.hit();
                this.target.hp -= this.dmg;
                for(let i=0;i<5;i++) GAME.particles.push({x:this.x, y:this.y, vx:(Math.random()-.5)*2, vy:Math.random()*2, life:15, c:'#ef4444', s:3});
            }
            return true; 
        }
        this.x += (dx/dist)*this.speed; this.y += (dy/dist)*this.speed;
        GAME.particles.push({x:this.x, y:this.y, vx:0, vy:0, life:5, c:'#cbd5e1', s:2}); 
        return false;
    }
    draw(c) { c.fillStyle = '#f8fafc'; c.fillRect(this.x-2, this.y-2, 4, 4); }
}

const GAME = {
    container: document.getElementById('game-container'),
    canvas: document.getElementById('game-canvas'),
    fogCanvas: document.getElementById('fog-canvas'),
    ctx: null, fogCtx: null, minimap: document.getElementById('minimap'), minimapCtx: null,
    sprites: {}, bgCanvas: null, 
    entities: [], particles: [], projectiles: [], floatingTexts: [],
    
    // Tightened starting economy to force early wood harvesting
    resources: { gold: 500, wood: 150, food: 0, maxFood: 0 },
    
    camX: 0, camY: 0, width: 0, height: 0,
    mouse: { x: 0, y: 0, worldX: 0, worldY: 0, isDown: false, startX: 0, startY: 0, in: false },
    keys: {}, selection: [], placingBuilding: null,
    
    lastTime: 0, frameCount: 0, timeOfDay: 8 * 60,
    state: 'playing', // 'playing', 'win', 'lose'
    peaceTimer: 7200, // 2 minutes at 60fps
    
    init() {
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.fogCtx = this.fogCanvas.getContext('2d');
        this.minimapCtx = this.minimap.getContext('2d', { alpha: false });
        
        const types = ['peasant', 'footman', 'orc', 'archer', 'tree', 'goldmine', 'townhall', 'farm', 'barracks', 'tower', 'orc_camp'];
        types.forEach(t => this.sprites[t] = SpriteGen.generate(t));
        
        this.buildMap();
        this.setupInput();
        
        // Player Base setup (Center)
        let sx = WORLD_WIDTH/2, sy = WORLD_HEIGHT/2;
        new Entity('townhall', sx, sy, 'player');
        new Entity('peasant', sx - 50, sy + 50, 'player');
        new Entity('peasant', sx + 50, sy + 50, 'player');
        new Entity('peasant', sx, sy + 60, 'player');
        
        new Entity('goldmine', sx - 300, sy - 100, 'neutral');
        for(let i=0; i<12; i++) new Entity('tree', sx + 200 + Math.random()*150, sy - 200 + Math.random()*200, 'neutral');
        
        // World Trees
        for(let i=0; i<300; i++) new Entity('tree', Math.random()*WORLD_WIDTH, Math.random()*WORLD_HEIGHT, 'neutral');
        
        // Orc Camps (The Objectives) - placed away from center
        const campLocs = [
            {x: 800, y: 800}, {x: WORLD_WIDTH-800, y: 800}, {x: WORLD_WIDTH/2, y: WORLD_HEIGHT-800}
        ];
        campLocs.forEach(loc => {
            new Entity('orc_camp', loc.x, loc.y, 'enemy');
            for(let j=0; j<3; j++) new Entity('orc', loc.x + (Math.random()-.5)*150, loc.y + (Math.random()-.5)*150, 'enemy');
        });

        this.camX = sx - this.canvas.width/2;
        this.camY = sy - this.canvas.height/2;
        
        requestAnimationFrame((t) => this.loop(t));
    },

    buildMap() {
        this.bgCanvas = document.createElement('canvas');
        this.bgCanvas.width = WORLD_WIDTH; this.bgCanvas.height = WORLD_HEIGHT;
        let ctx = this.bgCanvas.getContext('2d', { alpha: false });
        
        ctx.fillStyle = '#064e3b'; 
        ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
        for(let i=0; i<50000; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? '#065f46' : '#047857';
            ctx.fillRect(Math.random()*WORLD_WIDTH, Math.random()*WORLD_HEIGHT, 4, 4);
        }
        for(let p=0; p<80; p++) {
            let px = Math.random()*WORLD_WIDTH, py = Math.random()*WORLD_HEIGHT, r = 50 + Math.random()*150;
            for(let i=0; i<r*15; i++) {
                let ang = Math.random()*Math.PI*2, dist = Math.random()*r;
                ctx.fillStyle = Math.random() > 0.5 ? '#422006' : '#713f12';
                ctx.fillRect(px + Math.cos(ang)*dist, py + Math.sin(ang)*dist, 6, 6);
            }
        }
    },

    setupInput() {
        window.addEventListener('resize', () => this.resize());
        this.resize();
        
        this.container.addEventListener('mouseenter', () => this.mouse.in = true);
        this.container.addEventListener('mouseleave', () => this.mouse.in = false);

        this.container.addEventListener('mousedown', e => {
            if(e.button === 0) { AudioSys.init(); } 
            if(this.state !== 'playing') return;

            let rect = this.canvas.getBoundingClientRect();
            this.mouse.x = e.clientX - rect.left; this.mouse.y = e.clientY - rect.top;
            this.mouse.worldX = this.mouse.x + this.camX; this.mouse.worldY = this.mouse.y + this.camY;
            
            if (this.placingBuilding && e.button === 0) { this.placeBuilding(); return; }
            if (e.button === 0) { this.mouse.isDown = true; this.mouse.startX = this.mouse.worldX; this.mouse.startY = this.mouse.worldY; } 
            else if (e.button === 2) { this.handleRightClick(); }
        });
        
        this.container.addEventListener('mousemove', e => {
            let rect = this.canvas.getBoundingClientRect();
            this.mouse.x = e.clientX - rect.left; this.mouse.y = e.clientY - rect.top;
            this.mouse.worldX = this.mouse.x + this.camX; this.mouse.worldY = this.mouse.y + this.camY;
        });
        
        this.container.addEventListener('mouseup', e => {
            if (e.button === 0 && this.mouse.isDown) { this.mouse.isDown = false; this.handleSelect(); }
        });
        this.container.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', e => this.keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);

        const mmap = document.getElementById('minimap-container');
        let mmapDrag = false, mmapPanOffset = { x: 0, y: 0 };

        mmap.addEventListener('mousedown', e => { 
            mmapDrag = true; 
            let rect = this.minimap.getBoundingClientRect();
            let clickX = (e.clientX - rect.left) / rect.width * WORLD_WIDTH;
            let clickY = (e.clientY - rect.top) / rect.height * WORLD_HEIGHT;

            if (clickX >= this.camX && clickX <= this.camX + this.width && clickY >= this.camY && clickY <= this.camY + this.height) {
                mmapPanOffset.x = clickX - this.camX; mmapPanOffset.y = clickY - this.camY;
            } else {
                mmapPanOffset.x = this.width / 2; mmapPanOffset.y = this.height / 2;
                this.moveCamMinimap(e, mmapPanOffset);
            }
        });
        window.addEventListener('mousemove', e => { if(mmapDrag) this.moveCamMinimap(e, mmapPanOffset); });
        window.addEventListener('mouseup', () => mmapDrag = false);
    },

    resize() {
        this.width = this.container.clientWidth; this.height = this.container.clientHeight;
        this.canvas.width = this.width; this.canvas.height = this.height;
        this.fogCanvas.width = this.width; this.fogCanvas.height = this.height;
        this.ctx.imageSmoothingEnabled = false; this.fogCtx.imageSmoothingEnabled = false;
    },

    moveCamMinimap(e, offset) {
        let rect = this.minimap.getBoundingClientRect();
        let xPercent = (e.clientX - rect.left) / rect.width, yPercent = (e.clientY - rect.top) / rect.height;
        this.camX = Math.max(0, Math.min(WORLD_WIDTH - this.width, xPercent * WORLD_WIDTH - offset.x));
        this.camY = Math.max(0, Math.min(WORLD_HEIGHT - this.height, yPercent * WORLD_HEIGHT - offset.y));
    },

    handleSelect() {
        AudioSys.sfx.click();
        let dx = this.mouse.worldX - this.mouse.startX, dy = this.mouse.worldY - this.mouse.startY;
        this.selection.forEach(e => e.selected = false); this.selection = [];
        
        if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
            let sorted = [...this.entities].sort((a,b) => b.y - a.y); 
            for(let e of sorted) {
                if (Math.abs(e.x - this.mouse.worldX) < e.radius+10 && Math.abs(e.y - this.mouse.worldY) < e.height/2+10) {
                    e.selected = true; this.selection.push(e); break;
                }
            }
        } else {
            let minX = Math.min(this.mouse.startX, this.mouse.worldX), maxX = Math.max(this.mouse.startX, this.mouse.worldX);
            let minY = Math.min(this.mouse.startY, this.mouse.worldY), maxY = Math.max(this.mouse.startY, this.mouse.worldY);
            this.entities.forEach(e => {
                if (e.faction === 'player' && !e.isBuilding && e.x >= minX && e.x <= maxX && e.y >= minY && e.y <= maxY) {
                    e.selected = true; this.selection.push(e);
                }
            });
        }
        this.updateUI();
    },

    handleRightClick() {
        if (this.placingBuilding) { this.placingBuilding = null; return; }
        if (this.selection.length === 1 && this.selection[0].isBuilding && this.selection[0].faction === 'player') {
            AudioSys.sfx.click(); this.selection[0].rallyPos = { x: this.mouse.worldX, y: this.mouse.worldY }; return;
        }
        if (this.selection.length === 0) return;
        
        AudioSys.sfx.click();
        let target = null;
        let sorted = [...this.entities].sort((a,b) => b.y - a.y);
        for(let e of sorted) {
            if (Math.abs(e.x - this.mouse.worldX) < e.radius+10 && Math.abs(e.y - this.mouse.worldY) < e.height/2+10) { target = e; break; }
        }
        
        this.selection.forEach((unit, idx) => {
            if (unit.faction !== 'player' || unit.isBuilding) return;
            if (target) {
                if (target.faction === 'enemy') unit.cmdAtk(target);
                else if (target.isResource && unit.type === 'peasant') unit.cmdGather(target);
                else if (target.faction === 'player' && target.isBuilding && target.progress < 100 && unit.type === 'peasant') unit.cmdBuild(target);
                else if (target.type === 'townhall' && unit.type === 'peasant' && unit.heldRes) unit.cmdReturn(target);
                else unit.cmdMove(this.mouse.worldX + (Math.random()-.5)*20, this.mouse.worldY + (Math.random()-.5)*20);
            } else {
                let row = Math.floor(idx / 4), col = idx % 4;
                unit.cmdMove(this.mouse.worldX + (col-1.5)*30, this.mouse.worldY + (row-1.5)*30);
            }
        });
    },

    updateUI() {
        const els = {
            name: document.getElementById('sel-name'), stats: document.getElementById('sel-stats'),
            desc: document.getElementById('sel-desc'), hpBar: document.getElementById('sel-hp-bar'),
            hpFill: document.getElementById('sel-hp-fill'), panel: document.getElementById('action-panel')
        };
        
        els.panel.innerHTML = '';
        if (this.selection.length === 0) {
            els.name.textContent = "Nothing Selected"; els.name.className = "text-xl font-bold text-gray-500";
            els.stats.textContent = ""; els.desc.textContent = ""; els.hpBar.classList.add('hidden'); return;
        }
        
        let ent = this.selection[0];
        if (this.selection.length > 1) {
            els.name.textContent = `Multiple Units (${this.selection.length})`; els.name.className = "text-xl font-bold text-white";
            els.stats.textContent = "Mixed selection"; els.desc.textContent = "Right-click to command";
            els.hpBar.classList.add('hidden');
        } else {
            els.name.textContent = ent.type.replace('_', ' ').toUpperCase();
            els.name.className = `text-xl font-bold ${ent.faction==='player'?'text-blue-400':(ent.faction==='enemy'?'text-red-400':'text-yellow-400')}`;
            els.hpBar.classList.remove('hidden'); els.hpFill.style.width = `${Math.max(0, (ent.hp/ent.maxHp)*100)}%`;
            
            if (ent.isResource) {
                els.stats.textContent = `Resources: ${ent.resAmount}`; els.desc.textContent = ent.type==='tree' ? "Wood." : "Gold.";
                els.hpBar.classList.add('hidden');
            } else {
                els.stats.textContent = `HP: ${Math.floor(ent.hp)}/${ent.maxHp} ${ent.dmg ? `| Dmg: ${ent.dmg}` : ''}`;
                els.desc.textContent = `Status: ${ent.progress < 100 ? `Constructing ${Math.floor(ent.progress)}%` : ent.state}`;
            }
        }

        let isPlayer = this.selection.every(e => e.faction === 'player');
        if (!isPlayer) return;

        const addBtn = (title, cost, fn, afford) => {
            let b = document.createElement('button');
            b.className = `action-btn flex flex-col items-center justify-center p-2 rounded text-xs font-bold shadow-md ${!afford?'opacity-50 grayscale cursor-not-allowed':''}`;
            b.innerHTML = `<span>${title}</span><span class="text-blue-300 font-normal text-[10px] mt-1 whitespace-pre-line">${cost}</span>`;
            if (afford) b.onclick = (e) => { e.stopPropagation(); AudioSys.sfx.click(); fn(); };
            els.panel.appendChild(b);
        };

        if (this.selection.some(e => e.type === 'peasant')) {
            addBtn("Build Farm", "500 W", () => this.placingBuilding='farm', this.resources.wood >= 500);
            addBtn("Build Barracks", "600 G\n400 W", () => this.placingBuilding='barracks', this.resources.gold >= 600 && this.resources.wood >= 400);
            addBtn("Build Tower", "700 G\n300 W", () => this.placingBuilding='tower', this.resources.gold >= 700 && this.resources.wood >= 300);
        }
        if (this.selection.length === 1 && ent.type === 'townhall' && ent.progress >= 100) {
            addBtn("Train Peasant", "400 G\n1 Food", () => this.train(ent, 'peasant', 400, 0, 1), this.resources.gold >= 400 && this.resources.food < this.resources.maxFood);
        }
        if (this.selection.length === 1 && ent.type === 'barracks' && ent.progress >= 100) {
            addBtn("Train Footman", "600 G, 200 W\n1 Food", () => this.train(ent, 'footman', 600, 200, 1), this.resources.gold >= 600 && this.resources.wood >= 200 && this.resources.food < this.resources.maxFood);
            addBtn("Train Archer", "500 G, 300 W\n1 Food", () => this.train(ent, 'archer', 500, 300, 1), this.resources.gold >= 500 && this.resources.wood >= 300 && this.resources.food < this.resources.maxFood);
        }
    },

    placeBuilding() {
        let type = this.placingBuilding, cg = 0, cw = 0;
        if(type==='farm') cw=500; if(type==='barracks'){cg=600; cw=400;} if(type==='tower'){cg=700; cw=300;}
        if (this.resources.gold >= cg && this.resources.wood >= cw) {
            this.resources.gold -= cg; this.resources.wood -= cw;
            let bx = Math.round(this.mouse.worldX/TILE_SIZE)*TILE_SIZE, by = Math.round(this.mouse.worldY/TILE_SIZE)*TILE_SIZE;
            let b = new Entity(type, bx, by, 'player');
            this.selection.forEach(u => { if(u.type === 'peasant') u.cmdBuild(b); });
            this.placingBuilding = null; this.updateUI();
        }
    },

    train(b, type, cg, cw, cf) {
        if (this.resources.gold >= cg && this.resources.wood >= cw && this.resources.food < this.resources.maxFood) {
            this.resources.gold -= cg; this.resources.wood -= cw; this.resources.food += cf; 
            b.q = b.q || []; b.q.push(type); if (!b.qTimer) b.qTimer = 180;
            this.updateUI();
        }
    },

    setGameOver(result) {
        if (this.state !== 'playing') return;
        this.state = result;
        const banner = document.getElementById('game-over-banner');
        const title = document.getElementById('go-title');
        const desc = document.getElementById('go-desc');
        banner.classList.remove('hidden');
        
        if (result === 'win') {
            AudioSys.sfx.win();
            title.textContent = 'Victory'; title.className = 'text-6xl font-black text-yellow-400 mb-4 tracking-widest uppercase';
            desc.textContent = 'All Orc Camps Destroyed!';
        } else {
            AudioSys.sfx.lose();
            title.textContent = 'Defeat'; title.className = 'text-6xl font-black text-red-600 mb-4 tracking-widest uppercase';
            desc.textContent = 'Your Townhall has fallen.';
        }
    },

    loop(timestamp) {
        let dt = timestamp - this.lastTime;
        if (dt > 1000/60) {
            if (this.state === 'playing') this.updateLogic();
            this.draw();
            this.lastTime = timestamp;
        }
        requestAnimationFrame((t) => this.loop(t));
    },

    updateLogic() {
        this.frameCount++;
        
        // Time System
        this.timeOfDay += 0.05; 
        if (this.timeOfDay >= 24*60) this.timeOfDay = 0;
        let hrs = Math.floor(this.timeOfDay/60), mins = Math.floor(this.timeOfDay%60);
        document.getElementById('clock-display').textContent = `Day ${Math.floor(this.frameCount/28800)+1} - ${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}`;
        
        let overlay = document.getElementById('day-night-overlay');
        if (hrs >= 20 || hrs < 5) overlay.style.opacity = '0.6';
        else if (hrs === 5 || hrs === 19) overlay.style.opacity = '0.3';
        else overlay.style.opacity = '0';

        // Camera Pan
        let s = 12, e = 20;
        if (this.keys['w'] || this.keys['arrowup'] || (this.mouse.in && this.mouse.y < e && !this.mouse.isDown)) this.camY -= s;
        if (this.keys['s'] || this.keys['arrowdown'] || (this.mouse.in && this.mouse.y > this.height-e && !this.mouse.isDown)) this.camY += s;
        if (this.keys['a'] || this.keys['arrowleft'] || (this.mouse.in && this.mouse.x < e && !this.mouse.isDown)) this.camX -= s;
        if (this.keys['d'] || this.keys['arrowright'] || (this.mouse.in && this.mouse.x > this.width-e && !this.mouse.isDown)) this.camX += s;
        this.camX = Math.max(0, Math.min(WORLD_WIDTH - this.width, this.camX));
        this.camY = Math.max(0, Math.min(WORLD_HEIGHT - this.height, this.camY));

        // System updates
        for (let i = this.entities.length - 1; i >= 0; i--) this.entities[i].update();
        for (let i = this.projectiles.length - 1; i >= 0; i--) if (this.projectiles[i].update()) this.projectiles.splice(i, 1);
        for (let i = this.particles.length - 1; i >= 0; i--) { let p = this.particles[i]; p.life--; p.y -= p.vy; p.x += p.vx; if (p.life <= 0) this.particles.splice(i, 1); }
        for (let i = this.floatingTexts.length - 1; i >= 0; i--) { let f = this.floatingTexts[i]; f.life--; f.y -= 0.5; if (f.life <= 0) this.floatingTexts.splice(i, 1); }

        // Threat System & Orc Raids
        let statusEl = document.getElementById('status-display');
        let isPeaceful = this.frameCount < this.peaceTimer;
        
        if (isPeaceful) {
            statusEl.textContent = `Peaceful (${Math.ceil((this.peaceTimer - this.frameCount)/60)}s)`;
            statusEl.className = 'text-green-400 font-bold uppercase tracking-widest';
        } else {
            statusEl.textContent = 'Under Attack!';
            statusEl.className = 'text-red-500 font-bold uppercase tracking-widest animate-pulse';
            
            // Spawn waves from camps
            if (this.frameCount % 1200 === 0) { // Every 20 seconds after peace
                let camps = this.entities.filter(e => e.type === 'orc_camp');
                let th = this.entities.find(e => e.type === 'townhall' && e.faction === 'player');
                
                if (camps.length > 0 && th) {
                    AudioSys.sfx.alert();
                    // Wave size increases slowly over time
                    let waveSize = Math.min(4, 1 + Math.floor((this.frameCount - this.peaceTimer) / 3600)); 
                    camps.forEach(camp => {
                        for(let i=0; i<waveSize; i++) {
                            let o = new Entity('orc', camp.x + (Math.random()-.5)*60, camp.y + 30 + (Math.random()-.5)*30, 'enemy');
                            o.cmdAtk(th);
                        }
                    });
                }
            }
        }

        // Win/Loss Condition checks (1x per sec)
        if (this.frameCount % 60 === 0) {
            let playerTH = this.entities.some(e => e.type === 'townhall' && e.faction === 'player');
            let campsLeft = this.entities.some(e => e.type === 'orc_camp');
            if (!playerTH) this.setGameOver('lose');
            else if (!campsLeft) this.setGameOver('win');
        }

        // UI refresh
        if (this.frameCount % 30 === 0) {
            let maxF = 0, curF = 0;
            this.entities.forEach(e => {
                if (e.faction === 'player') {
                    if (e.type==='townhall' && e.progress>=100) maxF += 2;
                    if (e.type==='farm' && e.progress>=100) maxF += 4;
                    if (!e.isBuilding && !e.isResource) curF++;
                }
            });
            this.resources.food = curF; this.resources.maxFood = maxF;
            document.getElementById('res-gold').textContent = this.resources.gold;
            document.getElementById('res-wood').textContent = this.resources.wood;
            let fEl = document.getElementById('res-food'); fEl.textContent = `${curF}/${maxF}`;
            fEl.className = curF >= maxF ? 'text-red-500 font-bold' : 'text-red-400 font-bold';
            if (this.selection.length === 1) this.updateUI();
        }
    },

    draw() {
        let c = this.ctx;
        c.fillStyle = '#000'; c.fillRect(0, 0, this.width, this.height);
        
        c.save(); c.translate(-Math.floor(this.camX), -Math.floor(this.camY));
        c.drawImage(this.bgCanvas, 0, 0);
        
        let sorted = [...this.entities].sort((a,b) => a.y - b.y);
        for (let e of sorted) {
            if (e.x + 100 > this.camX && e.x - 100 < this.camX + this.width &&
                e.y + 100 > this.camY && e.y - 100 < this.camY + this.height) {
                e.draw(c);
            }
        }

        for (let p of this.particles) { c.fillStyle = p.c; c.fillRect(p.x, p.y, p.s, p.s); }
        for (let p of this.projectiles) p.draw(c);

        if (this.selection.length === 1 && this.selection[0].isBuilding && this.selection[0].rallyPos) {
            let b = this.selection[0], rp = b.rallyPos;
            c.strokeStyle = '#3b82f6'; c.lineWidth = 2; c.setLineDash([5, 5]);
            c.beginPath(); c.moveTo(b.x, b.y); c.lineTo(rp.x, rp.y); c.stroke();
            c.setLineDash([]); c.fillStyle = '#3b82f6'; c.beginPath(); c.arc(rp.x, rp.y, 4, 0, Math.PI*2); c.fill();
        }

        // Draw Floating Text (Harvest numbers)
        c.font = "bold 14px 'Courier New'";
        c.textAlign = "center";
        for (let f of this.floatingTexts) {
            c.fillStyle = f.c;
            c.globalAlpha = Math.min(1, f.life / 30);
            c.fillText(f.t, f.x, f.y);
            // subtle black outline
            c.lineWidth = 1; c.strokeStyle = '#000'; c.strokeText(f.t, f.x, f.y);
        }
        c.globalAlpha = 1.0;

        if (this.mouse.isDown && !this.placingBuilding) {
            c.strokeStyle = '#22c55e'; c.lineWidth = 1;
            let x = Math.min(this.mouse.startX, this.mouse.worldX), y = Math.min(this.mouse.startY, this.mouse.worldY);
            let w = Math.abs(this.mouse.worldX - this.mouse.startX), h = Math.abs(this.mouse.worldY - this.mouse.startY);
            c.strokeRect(x, y, w, h); c.fillStyle = 'rgba(34, 197, 94, 0.2)'; c.fillRect(x, y, w, h);
        }

        if (this.placingBuilding) {
            let bx = Math.round(this.mouse.worldX/TILE_SIZE)*TILE_SIZE, by = Math.round(this.mouse.worldY/TILE_SIZE)*TILE_SIZE;
            let spr = this.sprites[this.placingBuilding];
            let ok = (this.placingBuilding==='farm' && this.resources.wood>=500) || 
                     (this.placingBuilding==='barracks' && this.resources.gold>=600 && this.resources.wood>=400) ||
                     (this.placingBuilding==='tower' && this.resources.gold>=700 && this.resources.wood>=300);
            c.globalAlpha = 0.5; c.drawImage(spr, bx - spr.width/2, by - spr.height/2);
            c.fillStyle = ok ? 'rgba(0,255,0,0.3)' : 'rgba(255,0,0,0.5)';
            c.fillRect(bx - spr.width/2, by - spr.height/2, spr.width, spr.height);
            c.globalAlpha = 1.0;
        }
        c.restore();

        // Fog of War
        let fc = this.fogCtx;
        fc.clearRect(0,0,this.width, this.height);
        fc.fillStyle = '#000000'; fc.fillRect(0,0,this.width, this.height);
        fc.globalCompositeOperation = 'destination-out';
        
        for (let e of this.entities) {
            if (e.faction === 'player' && e.x + 400 > this.camX && e.x - 400 < this.camX + this.width &&
                e.y + 400 > this.camY && e.y - 400 < this.camY + this.height) {
                let sx = e.x - this.camX, sy = e.y - this.camY, rad = e.isBuilding ? 250 : 150;
                let grad = fc.createRadialGradient(sx, sy, rad*0.3, sx, sy, rad);
                grad.addColorStop(0, 'rgba(0,0,0,1)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
                fc.fillStyle = grad; fc.beginPath(); fc.arc(sx, sy, rad, 0, Math.PI*2); fc.fill();
            }
        }
        fc.globalCompositeOperation = 'source-over';

        // Minimap
        let mc = this.minimapCtx;
        mc.fillStyle = '#064e3b'; mc.fillRect(0, 0, 200, 200);
        let sx = 200/WORLD_WIDTH, sy = 200/WORLD_HEIGHT;
        
        for (let e of this.entities) {
            if(e.type==='tree') mc.fillStyle = '#22c55e';
            else if(e.type==='goldmine') mc.fillStyle = '#eab308';
            else if(e.faction==='player') mc.fillStyle = '#3b82f6';
            else if(e.type==='orc_camp') mc.fillStyle = '#7f1d1d';
            else if(e.faction==='enemy') mc.fillStyle = '#ef4444';
            else mc.fillStyle = '#fff';
            let s = e.isBuilding ? 4 : 2; mc.fillRect(e.x*sx - s/2, e.y*sy - s/2, s, s);
        }
        
        let mCam = document.getElementById('minimap-cam');
        mCam.classList.remove('hidden');
        mCam.style.left = `${this.camX * sx}px`; mCam.style.top = `${this.camY * sy}px`;
        mCam.style.width = `${this.width * sx}px`; mCam.style.height = `${this.height * sy}px`;
    }
};

class Entity {
    constructor(type, x, y, faction) {
        this.type = type; this.x = x; this.y = y; this.faction = faction;
        this.sprite = GAME.sprites[type];
        this.width = this.sprite.width; this.height = this.sprite.height;
        this.radius = this.width/2.5;
        this.selected = false; this.state = 'idle'; this.facingLeft = false;
        
        this.isBuilding = ['townhall', 'farm', 'barracks', 'tower', 'orc_camp'].includes(type);
        this.isResource = ['tree', 'goldmine'].includes(type);
        this.rallyPos = null;
        
        this.hp = this.maxHp = type==='townhall'?1200 : type==='orc_camp'?1000 : type==='tower'?600 : type==='farm'?400 : type==='barracks'?800 : type==='peasant'?30 : type==='archer'?40 : 60;
        
        if (!this.isBuilding && !this.isResource) {
            this.speed = type==='peasant'? 1.5 : 1.8;
            this.dmg = type==='peasant'? 2 : type==='archer'? 8 : 6;
            this.atkRange = (type==='archer' || type==='tower') ? 180 : 40; 
            this.atkCD = 0;
        }
        if (type === 'tower') { this.atkRange = 200; this.atkCD = 0; }
        
        if (this.isResource) this.resAmount = type==='tree' ? 500 : 25000;
        
        this.progress = 100;
        if (this.isBuilding && faction === 'player' && type !== 'townhall') { this.progress = 1; this.hp = 1; }
        
        GAME.entities.push(this);
    }
    
    update() {
        if (this.hp <= 0 && !this.isResource) { this.die(); return; }
        if (this.atkCD > 0) this.atkCD--;

        if (this.type === 'tower' && this.progress >= 100 && this.atkCD <= 0) {
            let targets = GAME.entities.filter(e => e.faction !== this.faction && e.hp > 0 && !e.isResource);
            let closest = null, minDist = this.atkRange;
            for(let t of targets) {
                let d = Math.sqrt((t.x-this.x)**2 + (t.y-this.y)**2);
                if (d < minDist) { minDist = d; closest = t; }
            }
            if (closest) {
                AudioSys.sfx.shoot();
                GAME.projectiles.push(new Projectile(this.x, this.y-20, closest.x, closest.y, closest, 10, this));
                this.atkCD = 50;
            }
        }

        if (!this.isBuilding && !this.isResource) {
            if (['move', 'g_move', 'r_move', 'a_move'].includes(this.state) && this.tPos) {
                let dx = this.tPos.x - this.x, dy = this.tPos.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dx !== 0) this.facingLeft = dx < 0; 
                
                if (dist < this.speed) {
                    this.x = this.tPos.x; this.y = this.tPos.y; this.arrive();
                } else {
                    this.x += (dx/dist)*this.speed; this.y += (dy/dist)*this.speed;
                    this.yOff = Math.sin(GAME.frameCount*0.3)*3; 
                }
            }
            
            if (this.state === 'gath') {
                if (!this.tEnt || this.tEnt.resAmount <= 0) { this.state = 'idle'; return; }
                if (GAME.frameCount % 30 === 0) { AudioSys.sfx[this.tEnt.type==='tree'?'chop':'mine'](); this.part(this.tEnt.type==='tree'?'#b45309':'#fef08a'); }
                if (--this.gTimer <= 0) {
                    this.heldRes = this.tEnt.type==='tree'?'wood':'gold';
                    this.tEnt.resAmount -= 10; if(this.tEnt.resAmount<=0) this.tEnt.die();
                    let h = GAME.entities.find(e=>e.type==='townhall' && e.faction==='player');
                    if (h) { this.tPos={x:h.x,y:h.y}; this.state='r_move'; } else this.state='idle';
                }
            }
            if (this.state === 'build') {
                if (!this.tEnt || this.tEnt.hp >= this.tEnt.maxHp) { this.state = 'idle'; return; }
                if (GAME.frameCount % 20 === 0) { AudioSys.sfx.build(); this.part('#9ca3af'); }
                if (--this.gTimer <= 0) {
                    this.tEnt.hp += 10; this.tEnt.progress = (this.tEnt.hp/this.tEnt.maxHp)*100;
                    if (this.tEnt.hp >= this.tEnt.maxHp) { this.tEnt.hp=this.tEnt.maxHp; this.tEnt.progress=100; this.state='idle'; }
                    this.gTimer = 30;
                }
            }
            if (this.state === 'atk') {
                if (!this.tEnt || this.tEnt.hp <= 0) { this.state = 'idle'; return; }
                let dx = this.tEnt.x - this.x, dy = this.tEnt.y - this.y;
                this.facingLeft = dx < 0;
                if (Math.sqrt(dx*dx + dy*dy) <= this.atkRange) {
                    if (this.atkCD <= 0) {
                        if (this.type === 'archer') {
                            AudioSys.sfx.shoot();
                            GAME.projectiles.push(new Projectile(this.x, this.y-10, this.tEnt.x, this.tEnt.y, this.tEnt, this.dmg, this));
                        } else {
                            AudioSys.sfx.hit();
                            this.tEnt.hp -= this.dmg; 
                            for(let i=0;i<5;i++) GAME.particles.push({x:this.tEnt.x, y:this.tEnt.y-10, vx:(Math.random()-.5)*2, vy:Math.random()*2, life:15, c:'#ef4444', s:3});
                        }
                        this.atkCD = 60;
                    }
                } else { this.tPos={x:this.tEnt.x,y:this.tEnt.y}; this.state='a_move'; }
            }

            // Fixed AI: Respecting the Peace Timer
            if (this.faction === 'enemy' && this.state === 'idle' && Math.random()<0.02) {
                let isPeaceful = GAME.frameCount < GAME.peaceTimer;
                let targets = GAME.entities.filter(e=>e.faction==='player');
                
                // Always defend if player gets too close (aggro range)
                let closeTarget = targets.find(t => Math.sqrt((t.x - this.x)**2 + (t.y - this.y)**2) < 300);

                if (closeTarget) {
                    this.cmdAtk(closeTarget);
                } else if (!isPeaceful && targets.length) {
                    // Global raids only after peace timer ends
                    let th = targets.find(t => t.type === 'townhall');
                    if(th && Math.random() < 0.5) this.cmdAtk(th);
                    else this.cmdAtk(targets[Math.floor(Math.random()*targets.length)]);
                }
                else {
                    // Just wander around the camp
                    this.cmdMove(this.x+(Math.random()-.5)*100, this.y+(Math.random()-.5)*100);
                }
            }

            // Simple Separation
            for (let o of GAME.entities) {
                if (o===this || o.isBuilding || o.isResource) continue;
                let dx = this.x - o.x, dy = this.y - o.y, distSq = dx*dx + dy*dy, md = this.radius+o.radius;
                if (distSq < md*md && distSq>0) {
                    let f = (md - Math.sqrt(distSq))*0.1;
                    this.x += (dx/Math.sqrt(distSq))*f; this.y += (dy/Math.sqrt(distSq))*f;
                }
            }
        }

        // Spawn Queue
        if (this.isBuilding && this.faction === 'player' && this.q && this.q.length > 0) {
            if (--this.qTimer <= 0) {
                let t = this.q.shift(), sx = this.x + (Math.random()>.5?1:-1)*30, sy = this.y + this.height/2 + 20;
                let newEnt = new Entity(t, sx, sy, 'player');
                if (this.rallyPos) newEnt.cmdMove(this.rallyPos.x, this.rallyPos.y); 
                this.qTimer = 180;
            }
        }
    }
    
    arrive() {
        this.yOff = 0;
        if (this.state === 'move') this.state = 'idle';
        else if (this.state === 'g_move') { this.state = 'gath'; this.gTimer = 120; }
        else if (this.state === 'r_move') {
            if (this.heldRes) {
                // VISUAL FEEDBACK: Floating Text
                let color = this.heldRes === 'gold' ? '#fde047' : '#f97316';
                let txt = `+10 ${this.heldRes.charAt(0).toUpperCase() + this.heldRes.slice(1)}`;
                GAME.floatingTexts.push({x: this.x, y: this.y - 20, t: txt, c: color, life: 60});
                
                GAME.resources[this.heldRes] += 10; 
                this.heldRes = null;
                if (this.tEnt && this.tEnt.resAmount>0) { this.tPos={x:this.tEnt.x,y:this.tEnt.y}; this.state='g_move'; }
                else this.state='idle';
            }
        }
        else if (this.state === 'a_move') this.state = 'atk';
    }

    cmdMove(x, y) { this.tPos={x,y}; this.state='move'; this.tEnt=null; }
    cmdGather(ent) { this.tEnt=ent; this.tPos={x:ent.x, y:ent.y}; this.state='g_move'; }
    cmdBuild(ent) { this.tEnt=ent; this.tPos={x:ent.x, y:ent.y+ent.height/2+10}; this.state='a_move'; this.arrive=()=>{this.state='build';this.gTimer=30;this.yOff=0;}; }
    cmdAtk(ent) { this.tEnt=ent; this.tPos={x:ent.x, y:ent.y}; this.state='a_move'; }
    cmdReturn(ent) { this.tPos={x:ent.x, y:ent.y}; this.state='r_move'; }
    
    part(color) { GAME.particles.push({x:this.tEnt.x+(Math.random()-.5)*20, y:this.tEnt.y-10, vx:0, vy:1, life:10, c:color, s:2}); }

    die() {
        let i = GAME.entities.indexOf(this); if(i>-1) GAME.entities.splice(i,1);
        i = GAME.selection.indexOf(this); if(i>-1) GAME.selection.splice(i,1);
        for(let j=0; j<20; j++) GAME.particles.push({x:this.x, y:this.y, vx:(Math.random()-.5)*4, vy:(Math.random()-.5)*4+2, life:30, c: this.isBuilding?'#4b5563':'#ef4444', s:4});
        if(this.selected) GAME.updateUI();
    }

    draw(c) {
        let dx = this.x - this.width/2, dy = this.y - this.height/2 + (this.yOff||0);
        
        if (this.selected) {
            c.beginPath(); c.ellipse(this.x, this.y + this.height/2 - 5, this.radius+5, this.radius/2+2, 0, 0, Math.PI*2);
            c.strokeStyle = '#22c55e'; c.lineWidth = 2; c.stroke();
        }

        c.save();
        if (this.facingLeft && !this.isBuilding) {
            c.translate(this.x, this.y); c.scale(-1, 1); c.translate(-this.x, -this.y);
        }

        if (this.isBuilding && this.progress < 100) {
            c.globalAlpha = 0.5 + (this.progress/200);
            c.drawImage(this.sprite, 0, this.sprite.height*(1-this.progress/100), this.width, this.height*(this.progress/100), dx, dy + this.height*(1-this.progress/100), this.width, this.height*(this.progress/100));
            c.globalAlpha = 1.0; c.strokeStyle = '#b45309'; c.strokeRect(dx, dy, this.width, this.height); 
        } else {
            c.drawImage(this.sprite, dx, dy);
        }
        c.restore();
        
        if (this.heldRes) { c.fillStyle = this.heldRes==='gold'?'#eab308':'#78350f'; c.fillRect(this.x+5, this.y-20, 6, 6); }

        if (this.selected || (this.hp < this.maxHp && !this.isResource)) {
            let bw = this.width*0.8, bh = 4;
            c.fillStyle = '#7f1d1d'; c.fillRect(this.x-bw/2, dy-8, bw, bh);
            c.fillStyle = '#22c55e'; c.fillRect(this.x-bw/2, dy-8, bw*(this.hp/this.maxHp), bh);
        }

        if (this.isBuilding && this.q && this.q.length) {
            let p = 1-(this.qTimer/180);
            c.fillStyle='#1e3a8a'; c.fillRect(this.x-15, this.y+this.height/2+5, 30, 4);
            c.fillStyle='#60a5fa'; c.fillRect(this.x-15, this.y+this.height/2+5, 30*p, 4);
        }
    }
}

// Start
window.onload = () => GAME.init();

</script>
