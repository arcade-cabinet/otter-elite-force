name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # Web: Build, test, produce shared artifact
  # ══════════════════════════════════════════════════════════════════════════
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build web
        env:
          VITE_BASE_URL: /otter-elite-force/
        run: pnpm build

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: web-dist
          path: dist/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # Web: Deploy to GitHub Pages
  # ══════════════════════════════════════════════════════════════════════════
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: dist/

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: dist/

      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        id: deploy

  # ══════════════════════════════════════════════════════════════════════════
  # Android: Build debug APKs (all architectures)
  # ══════════════════════════════════════════════════════════════════════════
  build-android:
    name: Android Debug APKs
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-disabled: true

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: dist/

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Clear Gradle caches (workaround bcprov-jdk18on JAR repackaging failure)
        run: rm -rf ~/.gradle/caches

      - name: Build debug APKs (all ABIs)
        working-directory: android
        run: ./gradlew clean assembleDebug --no-daemon --no-build-cache --refresh-dependencies --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p apk-output
          find android/app/build/outputs/apk/debug -name "*.apk" -exec cp {} apk-output/ \;
          ls -lh apk-output/

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-debug-apks
          path: apk-output/
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # Release: Create GitHub Release with APKs (manual dispatch or tags)
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-android, deploy-pages]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-debug-apks
          path: apk-output/

      - name: Generate release tag
        id: tag
        env:
          SHA: ${{ github.sha }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          gh release create "$TAG" \
            --title "Debug Build $TAG" \
            --notes "Automated debug APK build from commit ${SHA:0:7}." \
            --prerelease \
            apk-output/*.apk \
          || gh release upload "$TAG" apk-output/*.apk --clobber
